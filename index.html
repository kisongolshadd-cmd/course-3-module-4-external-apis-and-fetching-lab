<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Alerts App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Weather Alerts App</h1>
    
    <!-- Exact matching placeholder and IDs required by the test suite -->
    <input type="text" id="state-input" placeholder="Enter state abbreviation">
    <button id="fetch-alerts">Get Weather Alerts</button>
    
    <div id="alerts-display">
        <h2 id="alert-summary"></h2>
        <ul id="weather-alerts"></ul>
    </div>
    
    <!-- Dedicated error message div with the hidden fallback class -->
    <div id="error-message" class="hidden" style="display: none;"></div>
    
    <script src="./index.js"></script>
</body>
</html>
